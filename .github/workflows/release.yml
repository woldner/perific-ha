name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          version: "0.11.16"

      - name: Install Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Check lockfile
        run: uv lock --check

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate HACS integration
        uses: hacs/action@main
        with:
          category: integration

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - hacs
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Pin checkout to workflow commit
        run: git reset --hard "${{ github.sha }}"

      - name: Check initial release baseline
        id: baseline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_count="$(gh release list --limit 1 --json tagName --jq 'length')"
          if [ "$release_count" = "0" ]; then
            {
              echo "No GitHub Release exists yet."
              echo "Create an initial GitHub Release baseline, then pushes to main can release automatically."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "exists=true" >> "$GITHUB_OUTPUT"

      - name: Semantic version release
        id: release
        if: steps.baseline.outputs.exists == 'true'
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com
